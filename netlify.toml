[build]
  publish = "."

# Vercel-ийн api/*.js файлуудыг Netlify Functions-д шилжүүлэх
# (Netlify-ийн нэг feature: api/ folder-ийг автоматаар function болгож харна)
[functions]
  directory = "api"
  node_bundler = "esbuild"

# api/* request-ийг ижил нэртэй function руу шилжүүлэх
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
